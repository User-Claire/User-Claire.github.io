<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Platformer Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 3px solid #333;
            overflow: hidden;
        }
        .player {
            position: absolute;
            width: 30px;
            height: 40px;
            background-color: #FF6B6B;
            border-radius: 4px;
        }
        .platform {
            position: absolute;
            background-color: #8B4513;
            border: 2px solid #654321;
        }
        .enemy {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #FFD700;
            border-radius: 50%;
        }
        .coin {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #FFD700;
            border-radius: 50%;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 4px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="info">
            <div>Score: <span id="score">0</span></div>
            <div>Health: <span id="health">3</span></div>
            <div style="margin-top: 10px; font-size: 12px;">Arrow keys to move, Space to jump</div>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.container = document.getElementById('gameContainer');
                this.width = 800;
                this.height = 600;
                this.score = 0;
                this.health = 3;
                this.gameOver = false;

                this.player = {
                    x: 50,
                    y: 450,
                    width: 30,
                    height: 40,
                    velocityY: 0,
                    velocityX: 0,
                    jumping: false,
                    speed: 5,
                    jumpPower: 12,
                    gravity: 0.6
                };

                this.keys = {};
                this.platforms = [];
                this.enemies = [];
                this.coins = [];

                this.setupPlatforms();
                this.setupEnemies();
                this.setupCoins();
                this.createPlayerElement();

                window.addEventListener('keydown', (e) => this.handleKey(e, true));
                window.addEventListener('keyup', (e) => this.handleKey(e, false));

                this.gameLoop();
            }

            handleKey(event, pressed) {
                const key = event.key === ' ' ? 'Space' : event.key;
                this.keys[key] = pressed;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'a', 'd', 'w', 's'].includes(key)) {
                    event.preventDefault();
                }
            }

            setupPlatforms() {
                const platformData = [
                    { x: 0, y: 550, width: 800, height: 50 }, // ground
                    { x: 150, y: 450, width: 200, height: 20 },
                    { x: 500, y: 380, width: 200, height: 20 },
                    { x: 100, y: 300, width: 150, height: 20 },
                    { x: 550, y: 250, width: 150, height: 20 },
                    { x: 300, y: 180, width: 200, height: 20 }
                ];

                platformData.forEach(data => {
                    const platform = document.createElement('div');
                    platform.className = 'platform';
                    platform.style.left = data.x + 'px';
                    platform.style.top = data.y + 'px';
                    platform.style.width = data.width + 'px';
                    platform.style.height = data.height + 'px';
                    this.container.appendChild(platform);

                    this.platforms.push(data);
                });
            }

            setupEnemies() {
                const enemyData = [
                    { x: 200, y: 410, width: 30, height: 30, speed: 2, minX: 150, maxX: 350 },
                    { x: 550, y: 340, width: 30, height: 30, speed: 1.5, minX: 500, maxX: 700 }
                ];

                enemyData.forEach(data => {
                    const enemy = document.createElement('div');
                    enemy.className = 'enemy';
                    enemy.style.left = data.x + 'px';
                    enemy.style.top = data.y + 'px';
                    this.container.appendChild(enemy);

                    this.enemies.push({ ...data, element: enemy, direction: 1 });
                });
            }

            setupCoins() {
                const coinData = [
                    { x: 180, y: 410 },
                    { x: 280, y: 410 },
                    { x: 530, y: 330 },
                    { x: 620, y: 330 },
                    { x: 130, y: 280 },
                    { x: 200, y: 280 },
                    { x: 400, y: 160 }
                ];

                coinData.forEach(data => {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    coin.style.left = data.x + 'px';
                    coin.style.top = data.y + 'px';
                    this.container.appendChild(coin);

                    this.coins.push({ ...data, element: coin, collected: false });
                });
            }

            createPlayerElement() {
                this.playerElement = document.createElement('div');
                this.playerElement.className = 'player';
                this.playerElement.style.left = this.player.x + 'px';
                this.playerElement.style.top = this.player.y + 'px';
                this.container.appendChild(this.playerElement);
            }

            getLandingPlatform(nextX, nextY) {
                return this.platforms.find(p => {
                    const nextBottom = nextY + this.player.height;
                    const isAbovePlatform = this.player.y + this.player.height <= p.y;
                    const willLand = nextBottom >= p.y && nextBottom <= p.y + p.height;
                    const horizontalOverlap = nextX + this.player.width > p.x && nextX < p.x + p.width;
                    return isAbovePlatform && willLand && horizontalOverlap && this.player.velocityY >= 0;
                });
            }

            update() {
                if (this.gameOver) return;

                // Horizontal movement
                if (this.keys['ArrowLeft'] || this.keys['a']) {
                    this.player.velocityX = -this.player.speed;
                } else if (this.keys['ArrowRight'] || this.keys['d']) {
                    this.player.velocityX = this.player.speed;
                } else {
                    this.player.velocityX = 0;
                }

                // Apply movement
                let nextX = this.player.x + this.player.velocityX;
                let nextY = this.player.y + this.player.velocityY;

                if (nextX < 0) nextX = 0;
                if (nextX + this.player.width > this.width) nextX = this.width - this.player.width;

                this.player.velocityY += this.player.gravity;
                nextY = this.player.y + this.player.velocityY;

                const platform = this.getLandingPlatform(nextX, nextY);
                if (platform) {
                    nextY = platform.y - this.player.height;
                    this.player.velocityY = 0;
                    this.player.jumping = false;
                }

                this.player.x = nextX;
                this.player.y = nextY;

                if ((this.keys['Space'] || this.keys['ArrowUp'] || this.keys['w']) && !this.player.jumping) {
                    this.player.velocityY = -this.player.jumpPower;
                    this.player.jumping = true;
                }

                if (this.player.y > this.height) {
                    this.health--;
                    this.resetPlayer();
                }

                this.enemies.forEach(enemy => {
                    enemy.x += enemy.speed * enemy.direction;
                    if (enemy.x <= enemy.minX || enemy.x + enemy.width >= enemy.maxX) {
                        enemy.direction *= -1;
                    }
                    enemy.element.style.left = enemy.x + 'px';

                    if (this.checkCollision(this.player, enemy)) {
                        this.health--;
                        this.resetPlayer();
                    }
                });

                this.coins.forEach(coin => {
                    if (!coin.collected && this.checkCollision(this.player, coin)) {
                        coin.collected = true;
                        coin.element.style.display = 'none';
                        this.score += 10;
                    }
                });

                document.getElementById('score').textContent = this.score;
                document.getElementById('health').textContent = this.health;

                if (this.health <= 0) {
                    this.gameOver = true;
                    this.showGameOver();
                }

                this.playerElement.style.left = this.player.x + 'px';
                this.playerElement.style.top = this.player.y + 'px';
            }

            showGameOver() {
                const message = document.createElement('div');
                message.style.position = 'absolute';
                message.style.top = '50%';
                message.style.left = '50%';
                message.style.transform = 'translate(-50%, -50%)';
                message.style.padding = '20px 30px';
                message.style.background = 'rgba(0, 0, 0, 0.85)';
                message.style.color = '#fff';
                message.style.fontSize = '20px';
                message.style.borderRadius = '10px';
                message.style.textAlign = 'center';
                message.textContent = 'Game Over! Final Score: ' + this.score;
                this.container.appendChild(message);
            }

            checkCollision(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }

            resetPlayer() {
                this.player.x = 50;
                this.player.y = 450;
                this.player.velocityY = 0;
                this.player.jumping = false;
            }

            gameLoop() {
                this.update();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        new Game();
    </script>
</body>
</html>
